# Filesystem MCP Server 配置
# 对应 docs/06_MCP设计规范.md 第23节
#
# 配置说明：
# - server_id: 唯一标识
# - name: 显示名称
# - transport: 传输协议 (stdio | sse | http)
# - command: STDIO 模式的可执行命令
# - args: STDIO 模式的命令参数
# - url: SSE/HTTP 模式的服务地址
# - env: 环境变量
# - enabled: 是否启用
# - timeout: 超时时间(秒)
# - max_retry: 最大重试次数

server_id: filesystem
name: "Filesystem MCP"
transport: stdio
command: "npx"
args:
  - "-y"
  - "@modelcontextprotocol/server-filesystem"
  - "D:/Code/AI热点"
enabled: true
timeout: 30
max_retry: 3
